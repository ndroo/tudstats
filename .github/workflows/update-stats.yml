name: Update PUBG stats

on:
  schedule:
    # Every 3 hours. The PUBG API keeps ~14 days of matches, so this has a
    # huge safety margin even if a few runs fail.
    - cron: '23 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest matches
        run: node scripts/fetch-stats.mjs
        env:
          PUBG_API_KEY: ${{ secrets.PUBG_API_KEY }}

      - name: Commit updated data
        run: |
          if [[ -n "$(git status --porcelain data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "Update stats data"
            git push
          else
            echo "No new matches."
          fi
